# Blueprint Render: API (Node) + Static frontend (Vite SPA).
# DATABASE_URL и JWT_SECRET задайте в Render Dashboard → Environment.

services:
  - type: web
    name: grand-astra-backend
    runtime: node
    buildCommand: npm ci && npm run build -w @grandastra/api
    startCommand: npm run start:api
    envVars:
      - key: NODE_ENV
        value: production

  - type: web
    name: grand-astra
    runtime: static
    buildCommand: npm ci && npm run build -w @grandastra/web
    staticPublishPath: ./apps/web/dist
    envVars:
      - key: VITE_API_URL
        value: https://grand-astra-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
