# Blueprint Render: API (Node) + Static frontend (Vite SPA).
# При первом подключении Blueprint — подставьте своё имя сервиса / ветку.
# DATABASE_URL и JWT_SECRET задайте в Render Dashboard → Environment.

services:
  - type: web
    name: grandastra-api
    runtime: node
    buildCommand: npm ci && npm run build -w @grandastra/api
    startCommand: npm run start:api
    envVars:
      - key: NODE_ENV
        value: production

  - type: web
    name: grandastra-web
    runtime: static
    buildCommand: npm ci && npm run build -w @grandastra/web
    staticPublishPath: ./apps/web/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
